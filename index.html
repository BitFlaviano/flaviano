<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flaviano Sousa Porto - Portfólio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="particles" class="particles"></div>

    <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
        <span class="theme-icon">&#9728;</span>
    </button>
    <div id="authStatus" class="auth-status"></div>

    <section class="hero">
        <div class="hero-content">
            <div class="profile-img-wrapper">
                <img src="profile.jpg" alt="Flaviano Sousa Porto" class="profile-img">
            </div>
            <h1 id="displayName">Flaviano Sousa Porto</h1>
            <p class="subtitle" id="displaySubtitle"></p>
            <div class="typed-container">
                <span id="typedText"></span><span class="cursor"></span>
            </div>
            <div class="contact-links" id="contactLinks"></div>
        </div>
        <div class="scroll-indicator">
            <div class="mouse"></div>
            <span>Role para conhecer</span>
        </div>
    </section>

    <div class="container" id="mainContent"></div>

    <footer>
        <p>&copy; 2026 Flaviano Sousa Porto &mdash; Todos os direitos reservados</p>
        <div class="footer-links" id="footerLinks"></div>
    </footer>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Acesso Restrito</h2>
            </div>
            <div class="modal-body">
                <p style="color:var(--text-muted);margin-bottom:1rem;text-align:center;">Faça login para acessar o painel</p>
                <input type="email" id="loginEmail" class="modal-input" placeholder="E-mail" autocomplete="email" style="margin-bottom:0.5rem">
                <input type="password" id="loginPassword" class="modal-input" placeholder="Senha" autocomplete="current-password">
                <p id="loginError" style="color:#e74c3c;font-size:0.85rem;display:none;margin-top:0.5rem;"></p>
                <p id="loginSuccess" style="color:#2ecc71;font-size:0.85rem;display:none;margin-top:0.5rem;"></p>
                <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-muted)">
                    <a href="#" id="loginToggle" style="color:var(--accent);text-decoration:none;" onclick="toggleLoginMode(event)">Criar nova conta</a>
                </p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary" onclick="closeLogin()">Cancelar</button>
                <button class="modal-btn modal-btn-primary" id="loginSubmitBtn" onclick="submitLogin()">Entrar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="adminModal">
        <div class="modal modal-admin">
            <div class="modal-header">
                <h2>Painel Administrativo</h2>
                <button class="modal-close" onclick="closeAdmin()">&times;</button>
            </div>
            <div class="modal-body admin-body" id="adminBody">
                <nav class="admin-tabs" id="adminTabs"></nav>
                <div class="admin-content" id="adminContent"></div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary" onclick="closeAdmin()">Fechar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="data.js"></script>
    <script src="admin.js"></script>
    <script src="script.js"></script>
</body>
</html>
